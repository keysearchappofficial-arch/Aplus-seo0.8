<script>
  (function () {
    const API_BASE =
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3000"
        : "https://api.keysearch-app.com";

    const API_KEY =
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "aplus_seo_admin_2026_secure_token"
        : "aplus_seo_admin_2026_secure_token";

    const DAILY_TOPIC_LIMIT = 3;
    const TOPIC_LIMIT_STORAGE_KEY = "topic_generate_limit_v1";

    const modal = document.getElementById("topicModal");
    const openBtns = [
      document.getElementById("openTopicModalBtn"),
      document.getElementById("openTopicModalBtnBottom")
    ].filter(Boolean);

    const closeBtn = document.getElementById("closeTopicModalBtn");
    const form = document.getElementById("topicGenerateForm");
    const resetBtn = document.getElementById("resetTopicBtn");
    const submitBtn = document.getElementById("submitTopicBtn");
    const loadingBox = document.getElementById("topicLoading");
    const errorBox = document.getElementById("topicError");
    const resultsBox = document.getElementById("topicResults");

    function getTodayKey() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getTopicLimitState() {
      try {
        const raw = localStorage.getItem(TOPIC_LIMIT_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        const today = getTodayKey();

        if (parsed.date !== today) {
          return { date: today, count: 0 };
        }

        return {
          date: today,
          count: Number(parsed.count || 0)
        };
      } catch (_) {
        return { date: getTodayKey(), count: 0 };
      }
    }

    function setTopicLimitState(state) {
      localStorage.setItem(TOPIC_LIMIT_STORAGE_KEY, JSON.stringify(state));
    }

    function getRemainingTopicCount() {
      const state = getTopicLimitState();
      return Math.max(0, DAILY_TOPIC_LIMIT - state.count);
    }

    function canGenerateTopic() {
      return getRemainingTopicCount() > 0;
    }

    function consumeTopicQuota() {
      const state = getTopicLimitState();
      const nextState = {
        ...state,
        count: state.count + 1
      };
      setTopicLimitState(nextState);
      return nextState;
    }

    function renderLimitReached() {
      resultsBox.innerHTML = `
        <div class="topic-results__empty" style="border:1px solid #fde68a;background:#fffbeb;color:#92400e;">
          <strong style="display:block;margin-bottom:8px;">今日免費體驗次數已用完</strong>
          你今天已完成 ${DAILY_TOPIC_LIMIT} 次主題生成體驗。<br />
          如果你想持續建立題庫、銜接 AI 產文，歡迎聯繫我們體驗完整方案。
          <div style="margin-top:16px;">
            <a href="./contact.html" class="btn btn--primary">聯繫我們</a>
          </div>
        </div>
      `;
    }

    function openModal() {
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function setLoading(isLoading) {
      loadingBox.classList.toggle("is-show", isLoading);
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "生成中..." : "開始生成";
    }

    function setError(message = "") {
      errorBox.textContent = message;
      errorBox.classList.toggle("is-show", Boolean(message));
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderTopics(topics) {
      if (!Array.isArray(topics) || topics.length === 0) {
        resultsBox.innerHTML = `
          <div class="topic-results__empty">
            這次沒有產出主題，請調整條件後再試一次。
          </div>
        `;
        return;
      }

      const remaining = getRemainingTopicCount();

      resultsBox.innerHTML = `
        <div style="margin-bottom:14px;padding:12px 14px;border:1px solid #e2e8f0;border-radius:14px;background:#f8fafc;color:#475569;font-size:14px;">
          今日剩餘免費產題次數：<strong>${remaining}</strong> / ${DAILY_TOPIC_LIMIT}
        </div>

        <div class="topic-results__list">
          ${topics.map((item, index) => `
            <article class="topic-card">
              <div class="topic-card__top">
                <span class="topic-badge">#${index + 1}</span>
                <span class="topic-badge">${escapeHtml(item.category || "未分類")}</span>
                <span class="topic-badge">${escapeHtml(item.intent || "資訊型")}</span>
              </div>

              <h3>${escapeHtml(item.title || "")}</h3>
              <p>${escapeHtml(item.reason || "適合作為 SEO 內容主題，能延伸成文章與關鍵字頁。")}</p>

              <div class="topic-card__actions">
                <button type="button" class="topic-mini-btn" data-copy="${escapeHtml(item.title || "")}">
                  複製題目
                </button>
                <button type="button" class="topic-mini-btn" data-fill-article="${escapeHtml(item.title || "")}">
                  帶去產文
                </button>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    async function generateTopics(payload) {
      const response = await fetch(`${API_BASE}/api/ollama/topics`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": API_KEY
        },
        body: JSON.stringify(payload)
      });

      let result = {};
      try {
        result = await response.json();
      } catch (error) {
        throw new Error("API 回傳格式錯誤，請稍後再試。");
      }

      if (!response.ok) {
        throw new Error(result?.message || "產題失敗，請稍後再試。");
      }

      return result;
    }

    openBtns.forEach((btn) => {
      btn.addEventListener("click", openModal);
    });

    closeBtn.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) {
        closeModal();
      }
    });

    resetBtn.addEventListener("click", () => {
      form.reset();
      setError("");

      const remaining = getRemainingTopicCount();

      resultsBox.innerHTML = `
        <div class="topic-results__empty">
          輸入你的產業、服務與關鍵字後，點擊「開始生成」，這裡就會顯示 AI 幫你整理好的 SEO 主題。<br /><br />
          今日剩餘免費產題次數：<strong>${remaining}</strong> / ${DAILY_TOPIC_LIMIT}
        </div>
      `;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      setError("");

      if (!canGenerateTopic()) {
        setError("今日免費產題次數已用完。");
        renderLimitReached();
        return;
      }

      setLoading(true);

      const formData = new FormData(form);
      const payload = {
        industry: formData.get("industry")?.toString().trim(),
        service: formData.get("service")?.toString().trim(),
        region: formData.get("region")?.toString().trim(),
        audience: formData.get("audience")?.toString().trim(),
        tone: formData.get("tone")?.toString().trim(),
        category: formData.get("category")?.toString().trim(),
        keywords: formData.get("keywords")?.toString().trim(),
        count: Number(formData.get("count") || 10)
      };

      try {
        const result = await generateTopics(payload);
        consumeTopicQuota();
        renderTopics(result.topics || []);
      } catch (error) {
        setError(error.message || "產題失敗，請稍後再試。");
      } finally {
        setLoading(false);
      }
    });

    resultsBox.addEventListener("click", async (event) => {
      const copyBtn = event.target.closest("[data-copy]");
      const articleBtn = event.target.closest("[data-fill-article]");

      if (copyBtn) {
        const text = copyBtn.getAttribute("data-copy") || "";
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = "已複製";
          setTimeout(() => {
            copyBtn.textContent = "複製題目";
          }, 1200);
        } catch (error) {
          console.error("複製失敗：", error);
        }
      }

      if (articleBtn) {
        const topic = articleBtn.getAttribute("data-fill-article") || "";
        const targetUrl = `./seo-content.html?topic=${encodeURIComponent(topic)}`;
        window.location.href = targetUrl;
      }
    });

    (function initTopicTrialHint() {
      const remaining = getRemainingTopicCount();

      resultsBox.innerHTML = `
        <div class="topic-results__empty">
          輸入你的產業、服務與關鍵字後，點擊「開始生成」，這裡就會顯示 AI 幫你整理好的 SEO 主題。<br /><br />
          今日剩餘免費產題次數：<strong>${remaining}</strong> / ${DAILY_TOPIC_LIMIT}
        </div>
      `;
    })();
  })();
</script>
